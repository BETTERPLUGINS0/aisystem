  SPRING: 'Frühling'
  SUMMER: 'Sommer'
  FALL: 'Herbst'
  WINTER: 'Winter'

messages:
  notAllowedWorld: "&cJahreszeiten sind in der Welt &e%world%&c nicht erlaubt."
